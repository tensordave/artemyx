# Artemyx Demo Configuration
# Used by the landing page to showcase the declarative config system.
# Vancouver parks walkshed: layered 200m and 400m buffers over carto-dark basemap.

map:
  center: [-123.1207, 49.2827]
  zoom: 12
  basemap: carto-dark

datasets:
  - id: parks
    url: "https://opendata.vancouver.ca/api/explore/v2.1/catalog/datasets/parks-polygon-representation/exports/geojson?lang=en&timezone=America%2FLos_Angeles"
    name: Vancouver Parks
    color: "#4ade80"

operations:
  - type: buffer
    input: parks
    output: walkshed_200m
    name: Walkshed (200m)
    params:
      distance: 200
      units: meters
      dissolve: true

  - type: buffer
    input: parks
    output: walkshed_400m
    name: Walkshed (400m)
    params:
      distance: 400
      units: meters
      dissolve: true

layers:
  # 400m walkshed (outer) - cooler blue teal
  - id: walkshed-400m-fill
    source: walkshed_400m
    type: fill
    paint:
      fill-color: "#22d3ee"
      fill-opacity: 0.07

  - id: walkshed-400m-outline
    source: walkshed_400m
    type: line
    paint:
      line-color: "#22d3ee"
      line-width: 1.0
      line-opacity: 0.15

  # 200m walkshed (inner) - greener teal
  - id: walkshed-200m-fill
    source: walkshed_200m
    type: fill
    paint:
      fill-color: "#2dd4bf"
      fill-opacity: 0.1

  - id: walkshed-200m-outline
    source: walkshed_200m
    type: line
    paint:
      line-color: "#2dd4bf"
      line-width: 1.0
      line-opacity: 0.2

  # Park polygons
  - id: parks-fill
    source: parks
    tooltip: ["park_name", "area_ha"]
    type: fill
    paint:
      fill-color: "#4ade80"
      fill-opacity: 0.45

  # Parks outline
  - id: parks-outline
    source: parks
    type: line
    paint:
      line-color: "#166534"
      line-width: 1
      line-opacity: 0.5
