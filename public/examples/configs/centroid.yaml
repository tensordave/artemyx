# Artemyx Example - Centroid
# Denver park polygons reduced to centroid points.

map:
  center: [-104.9903, 39.7392]  # Denver, CO
  zoom: 11
  basemap: carto-dark

datasets:
  - id: parks
    url: "https://services1.arcgis.com/zdB7qR0BtYrg0Xpl/arcgis/rest/services/ODC_PARK_PARKLAND_A/FeatureServer/87/query?outFields=*&where=1%3D1&f=geojson"
    name: Denver Parks
    color: "#22c55e"

operations:
  # Derive center point of each park polygon
  - type: centroid
    input: parks
    output: park_centroids
    name: Park Centroids
    style:
      labelField: LOCATION
      labelSize: 11
      labelColor: "#ffffff"
      labelHaloColor: "#1a1a1a"
      labelHaloWidth: 1
      labelMinzoom: 15

layers:
  # Park polygons as muted fill for context
  - id: parks-fill
    source: parks
    type: fill
    paint:
      fill-color: "#94a3b8"
      fill-opacity: 0.2

  - id: parks-outline
    source: parks
    type: line
    paint:
      line-color: "#64748b"
      line-width: 1

  # Park centroids as circles on top
  - id: park-centroids
    source: park_centroids
    tooltip: LOCATION
    type: circle
    paint:
      circle-radius: 3
      circle-color: "#22c55e"
      circle-stroke-color: "#14532d"
      circle-stroke-width: 1.5
